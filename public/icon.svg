<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2952b8" />
      <stop offset="100%" style="stop-color:#1e3f8f" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" />
  <!-- Book/clipboard icon -->
  <g transform="translate(256, 256)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clipboard body -->
    <rect x="-100" y="-120" width="200" height="260" rx="16" />
    <!-- Clipboard top clip -->
    <rect x="-40" y="-140" width="80" height="40" rx="8" />
    <!-- Check lines -->
    <line x1="-60" y1="-50" x2="-30" y2="-50" />
    <polyline points="-60,-50 -50,-40 -30,-60" />
    <line x1="-10" y1="-50" x2="70" y2="-50" />
    <!-- Second item -->
    <line x1="-60" y1="0" x2="-30" y2="0" />
    <polyline points="-60,0 -50,10 -30,-10" />
    <line x1="-10" y1="0" x2="70" y2="0" />
    <!-- Third item -->
    <rect x="-58" y="42" width="24" height="24" rx="4" />
    <line x1="-10" y1="54" x2="70" y2="54" />
  </g>
</svg>
